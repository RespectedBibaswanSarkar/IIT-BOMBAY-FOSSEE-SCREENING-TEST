<svg width="140" height="50" viewBox="0 0 140 50" fill="none" xmlns="http://www.w3.org/2000/svg" class="fossee-logo">

  <rect width="140" height="8" fill="#FF6B35"/>
  
  <!-- FOSSEE text in neon orange -->
  <text x="10" y="38" font-family="Poppins, sans-serif" font-size="28" font-weight="800" fill="#FF6B35" letter-spacing="2">
